{{ define "main" }}
  {{ with .Content }}
    <div class="index-content">
      {{ . }}
    </div>
  {{ end }}
  <div class="posts">
    {{ range where (where .Site.RegularPages "Section" "posts") ".Params.featured" true }}
      {{ partial "post-list-item.html" . }}
    {{ end }}
  </div>
{{ end }}
