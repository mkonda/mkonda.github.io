<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractals</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050510}
canvas{display:block;width:100%;height:calc(100vh - 94px);object-fit:contain}
.panel{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,16,.96);border-top:1px solid rgba(255,255,255,.06);padding:8px 16px;display:flex;flex-wrap:wrap;gap:6px 12px;align-items:center;font:12px/1.4 monospace;color:#889}
.panel .sep{width:1px;height:22px;background:rgba(255,255,255,.06);margin:0 4px}
.panel label{display:flex;align-items:center;gap:5px;color:#778}
.panel button{background:rgba(255,255,255,.06);color:#778;border:1px solid rgba(255,255,255,.1);padding:3px 10px;cursor:pointer;font:11px/1.3 monospace;border-radius:3px}
.panel button:hover{background:rgba(255,255,255,.14);color:#aab}
.panel button.active{background:rgba(255,255,255,.14);color:#ddc;border-color:rgba(255,255,255,.2)}
.panel .pal-btn{width:28px;height:16px;border-radius:2px;padding:0;border:1px solid rgba(255,255,255,.12)}
.panel .pal-btn.active{border-color:rgba(255,255,255,.4);box-shadow:0 0 4px rgba(255,255,255,.1)}
.panel input[type=range]{width:80px;accent-color:#998}
.panel .val{color:#667;font-size:10px;min-width:28px;text-align:right}
#paramRow{display:none}
</style>
</head>
<body>
<canvas id="art" width="1200" height="700"></canvas>
<div class="panel">
  <button class="active" onclick="setFractal(0)">Mandelbrot</button>
  <button onclick="setFractal(1)">Julia</button>
  <button onclick="setFractal(2)">Burning Ship</button>
  <button onclick="setFractal(3)">Tricorn</button>
  <button onclick="setFractal(4)">Newton</button>
  <div class="sep"></div>
  <button class="pal-btn active" onclick="setPalette(0)" style="background:linear-gradient(90deg,#000764,#206bcb,#edffff,#ffaa00,#000200)"></button>
  <button class="pal-btn" onclick="setPalette(1)" style="background:linear-gradient(90deg,#000,#b00,#ff5000,#ffc832,#000)"></button>
  <button class="pal-btn" onclick="setPalette(2)" style="background:linear-gradient(90deg,#00051e,#002878,#1e8cc8,#96dcff,#00051e)"></button>
  <button class="pal-btn" onclick="setPalette(3)" style="background:linear-gradient(90deg,#05000a,#9600c8,#ff0096,#00c8ff,#05000a)"></button>
  <button class="pal-btn" onclick="setPalette(4)" style="background:linear-gradient(90deg,#140a05,#503214,#287828,#64b450,#c8aa64)"></button>
  <button class="pal-btn" onclick="setPalette(5)" style="background:linear-gradient(90deg,#000,#c8c8c8,#000)"></button>
  <div class="sep"></div>
  <label>Detail <input type="range" id="iters" min="20" max="500" value="120" oninput="setIter()"><span class="val" id="iterVal">120</span></label>
  <label>Shift <input type="range" id="cshift" min="0" max="100" value="0" oninput="setShift()"></label>
  <div class="sep"></div>
  <span id="paramRow">
    <label>c real <input type="range" id="cr" min="-200" max="200" value="-70" oninput="setParam()"><span class="val" id="crVal">-0.70</span></label>
    <label>c imag <input type="range" id="ci" min="-200" max="200" value="27" oninput="setParam()"><span class="val" id="ciVal">0.27</span></label>
    <div class="sep"></div>
  </span>
  <button onclick="resetView()">Reset</button>
</div>
<script>
(function () {
'use strict';

var canvas = document.getElementById('art');
var ctx = canvas.getContext('2d');
var W = 1200, H = 700;

function lerp(a,b,t){return a+(b-a)*t}
function clamp(t){return t<0?0:t>1?1:t}

/* ── palettes ── */

var palettes = [
  [{t:0,r:0,g:7,b:100},{t:.16,r:32,g:107,b:203},{t:.42,r:237,g:255,b:255},{t:.6425,r:255,g:170,b:0},{t:.8575,r:0,g:2,b:0},{t:1,r:0,g:7,b:100}],
  [{t:0,r:0,g:0,b:0},{t:.2,r:176,g:0,b:0},{t:.45,r:255,g:80,b:0},{t:.7,r:255,g:200,b:50},{t:.9,r:255,g:255,b:180},{t:1,r:0,g:0,b:0}],
  [{t:0,r:0,g:5,b:30},{t:.25,r:0,g:40,b:120},{t:.5,r:30,g:140,b:200},{t:.75,r:150,g:220,b:255},{t:.9,r:240,g:250,b:255},{t:1,r:0,g:5,b:30}],
  [{t:0,r:5,g:0,b:10},{t:.2,r:150,g:0,b:200},{t:.4,r:255,g:0,b:150},{t:.6,r:0,g:200,b:255},{t:.8,r:0,g:255,b:100},{t:1,r:5,g:0,b:10}],
  [{t:0,r:20,g:10,b:5},{t:.2,r:80,g:50,b:20},{t:.4,r:40,g:120,b:40},{t:.6,r:100,g:180,b:80},{t:.8,r:200,g:170,b:100},{t:1,r:20,g:10,b:5}],
  [{t:0,r:0,g:0,b:0},{t:.5,r:210,g:210,b:210},{t:1,r:0,g:0,b:0}]
];

function samplePal(pal, t) {
  t = ((t%1)+1)%1;
  for (var i = 0; i < pal.length-1; i++) {
    if (t <= pal[i+1].t) {
      var f = (t-pal[i].t)/(pal[i+1].t-pal[i].t);
      return [Math.round(lerp(pal[i].r,pal[i+1].r,f)),
              Math.round(lerp(pal[i].g,pal[i+1].g,f)),
              Math.round(lerp(pal[i].b,pal[i+1].b,f))];
    }
  }
  return [pal[0].r,pal[0].g,pal[0].b];
}

/* ── fractal functions ── */

function mandelbrot(cx, cy, maxI) {
  var x=0,y=0,i,xx,yy;
  for (i=0;i<maxI;i++) { xx=x*x; yy=y*y; if(xx+yy>4)break; y=2*x*y+cy; x=xx-yy+cx; }
  if (i===maxI) return -1;
  return i+1-Math.log(Math.log(xx+yy)/2/Math.log(2))/Math.log(2);
}

function julia(zx, zy, maxI) {
  var x=zx,y=zy,i,xx,yy;
  for (i=0;i<maxI;i++) { xx=x*x; yy=y*y; if(xx+yy>4)break; y=2*x*y+juliaCi; x=xx-yy+juliaCr; }
  if (i===maxI) return -1;
  return i+1-Math.log(Math.log(xx+yy)/2/Math.log(2))/Math.log(2);
}

function burningShip(cx, cy, maxI) {
  var x=0,y=0,i,xx,yy;
  for (i=0;i<maxI;i++) { xx=x*x; yy=y*y; if(xx+yy>4)break; y=Math.abs(2*x*y)+cy; x=xx-yy+cx; }
  if (i===maxI) return -1;
  return i+1-Math.log(Math.log(xx+yy)/2/Math.log(2))/Math.log(2);
}

function tricorn(cx, cy, maxI) {
  var x=0,y=0,i,xx,yy;
  for (i=0;i<maxI;i++) { xx=x*x; yy=y*y; if(xx+yy>4)break; y=-2*x*y+cy; x=xx-yy+cx; }
  if (i===maxI) return -1;
  return i+1-Math.log(Math.log(xx+yy)/2/Math.log(2))/Math.log(2);
}

var NR = [[1,0],[-0.5,0.866025],[-0.5,-0.866025]];
function newton(cx, cy, maxI) {
  var x=cx,y=cy,i;
  for (i=0;i<maxI;i++) {
    var x2=x*x,y2=y*y;
    var fpx=3*(x2-y2),fpy=6*x*y;
    var d=fpx*fpx+fpy*fpy;
    if(d<1e-12)return -1;
    var fx=x*(x2-3*y2)-1, fy=y*(3*x2-y2);
    x-=(fx*fpx+fy*fpy)/d; y-=(fy*fpx-fx*fpy)/d;
    for(var r=0;r<3;r++){var dx=x-NR[r][0],dy=y-NR[r][1];if(dx*dx+dy*dy<1e-6)return r/3+i/maxI*.3;}
  }
  return -1;
}

var computeFns = [mandelbrot, julia, burningShip, tricorn, newton];

/* ── state ── */

var curFractal = 0, curPalette = 0, maxIter = 120, colorShift = 0;
var juliaCr = -0.7, juliaCi = 0.27;
var viewCX, viewCY, viewScale;

var defaults = [
  {cx:-.5,cy:0,s:3}, {cx:0,cy:0,s:3}, {cx:-.4,cy:-.55,s:3.5}, {cx:-.3,cy:0,s:3}, {cx:0,cy:0,s:3.5}
];

function resetView() {
  var d = defaults[curFractal];
  viewCX = d.cx; viewCY = d.cy; viewScale = d.s;
}
resetView();

/* ── rendering ── */

var renderTimer = null;
var PRW = 400, PRH = 233, FRW = 1200, FRH = 700;
var prevCvs = document.createElement('canvas');
prevCvs.width = PRW; prevCvs.height = PRH;
var prevCtx = prevCvs.getContext('2d');
var fullCvs = document.createElement('canvas');
fullCvs.width = FRW; fullCvs.height = FRH;
var fullCtx = fullCvs.getContext('2d');

function render(fullRes) {
  try {
    var rw = fullRes ? FRW : PRW;
    var rh = fullRes ? FRH : PRH;
    var tc = fullRes ? fullCtx : prevCtx;
    var imgData = tc.createImageData(rw, rh);
    var data = imgData.data;
    var aspect = rw/rh;
    var pal = palettes[curPalette];
    var shift = colorShift/100;
    var fn = computeFns[curFractal];
    var mi = maxIter;

    for (var py = 0; py < rh; py++) {
      for (var px = 0; px < rw; px++) {
        var fx = viewCX + (px/rw-.5)*viewScale;
        var fy = viewCY + (py/rh-.5)*viewScale/aspect;
        var iter = fn(fx, fy, mi);
        var idx = (py*rw+px)*4;
        if (iter < 0) { data[idx]=data[idx+1]=data[idx+2]=0; }
        else { var c=samplePal(pal,(iter/mi+shift)%1); data[idx]=c[0]; data[idx+1]=c[1]; data[idx+2]=c[2]; }
        data[idx+3]=255;
      }
    }
    tc.putImageData(imgData, 0, 0);
    ctx.imageSmoothingEnabled = !fullRes;
    ctx.drawImage(fullRes ? fullCvs : prevCvs, 0, 0, W, H);
    drawOverlay();
  } catch(e) {
    ctx.fillStyle = '#050510';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#cc6644';
    ctx.font = '14px monospace';
    ctx.fillText('render error: '+e.message, 20, 30);
  }
}

function drawOverlay() {
  ctx.fillStyle = 'rgba(200,195,180,.25)';
  ctx.font = '11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('center: '+viewCX.toFixed(8)+(viewCY>=0?' + ':' - ')+Math.abs(viewCY).toFixed(8)+'i', 8, H-8);
  ctx.fillText('zoom: '+(3/viewScale).toFixed(1)+'x', 8, H-20);
}

function scheduleRender() {
  clearTimeout(renderTimer);
  requestAnimationFrame(function() {
    render(false);
    renderTimer = setTimeout(function(){ render(true); }, 300);
  });
}

/* ── coordinate mapping ── */

function canvasXY(clientX, clientY) {
  var rect = canvas.getBoundingClientRect();
  var cAR=W/H, eAR=rect.width/rect.height;
  var rw,rh,ox,oy;
  if(eAR>cAR){rh=rect.height;rw=rh*cAR;ox=(rect.width-rw)/2;oy=0;}
  else{rw=rect.width;rh=rw/cAR;ox=0;oy=(rect.height-rh)/2;}
  return{x:(clientX-rect.left-ox)/rw*W, y:(clientY-rect.top-oy)/rh*H};
}

/* ── mouse interaction ── */

var panning=false, panSX,panSY,panVCX,panVCY;

canvas.addEventListener('wheel', function(e) {
  e.preventDefault();
  var m = canvasXY(e.clientX, e.clientY);
  var factor = e.deltaY > 0 ? 1.15 : 1/1.15;
  var aspect = W/H;
  var fx = viewCX + (m.x/W-.5)*viewScale;
  var fy = viewCY + (m.y/H-.5)*viewScale/aspect;
  viewScale *= factor;
  viewCX = fx - (m.x/W-.5)*viewScale;
  viewCY = fy - (m.y/H-.5)*viewScale/aspect;
  scheduleRender();
}, {passive:false});

canvas.addEventListener('mousedown', function(e) {
  panning=true; panSX=e.clientX; panSY=e.clientY; panVCX=viewCX; panVCY=viewCY;
  canvas.style.cursor='grabbing';
});
canvas.addEventListener('mousemove', function(e) {
  if(!panning)return;
  var rect=canvas.getBoundingClientRect();
  var cAR=W/H, eAR=rect.width/rect.height;
  var rw=eAR>cAR?rect.height*cAR:rect.width;
  var rh=eAR>cAR?rect.height:rect.width/cAR;
  var dx=(e.clientX-panSX)/rw*viewScale;
  var dy=(e.clientY-panSY)/rh*viewScale;
  viewCX=panVCX-dx; viewCY=panVCY-dy;
  render(false);
});
canvas.addEventListener('mouseup', function(){
  if(panning){panning=false; canvas.style.cursor='crosshair'; scheduleRender();}
});
canvas.addEventListener('mouseleave', function(){ if(panning){panning=false; canvas.style.cursor='crosshair'; scheduleRender();}});
canvas.style.cursor='crosshair';

/* ── touch interaction ── */

var touchDist0=0,touchScale0=0,touchCX0=0,touchCY0=0;
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
    touchDist0=Math.sqrt(dx*dx+dy*dy); touchScale0=viewScale;
  } else if(e.touches.length===1){
    panning=true; panSX=e.touches[0].clientX; panSY=e.touches[0].clientY; panVCX=viewCX; panVCY=viewCY;
  }
},{passive:false});
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
    var d=Math.sqrt(dx*dx+dy*dy);
    viewScale=touchScale0*touchDist0/d;
    render(false);
  } else if(e.touches.length===1&&panning){
    var rect=canvas.getBoundingClientRect();
    var cAR=W/H, eAR=rect.width/rect.height;
    var rw=eAR>cAR?rect.height*cAR:rect.width;
    var rh=eAR>cAR?rect.height:rect.width/cAR;
    viewCX=panVCX-(e.touches[0].clientX-panSX)/rw*viewScale;
    viewCY=panVCY-(e.touches[0].clientY-panSY)/rh*viewScale;
    render(false);
  }
},{passive:false});
canvas.addEventListener('touchend', function(e) {
  e.preventDefault(); panning=false; scheduleRender();
},{passive:false});

/* ── UI controls ── */

function activateBtn(selector, idx) {
  var btns = document.querySelectorAll(selector);
  btns.forEach(function(b,i){ b.classList.toggle('active', i===idx); });
}

window.setFractal = function(idx) {
  curFractal = idx;
  activateBtn('.panel > button:not(.pal-btn)', idx);
  document.getElementById('paramRow').style.display = idx===1 ? 'inline-flex' : 'none';
  resetView();
  scheduleRender();
};

window.setPalette = function(idx) {
  curPalette = idx;
  activateBtn('.pal-btn', idx);
  scheduleRender();
};

window.setIter = function() {
  maxIter = parseInt(document.getElementById('iters').value);
  document.getElementById('iterVal').textContent = maxIter;
  scheduleRender();
};

window.setShift = function() {
  colorShift = parseInt(document.getElementById('cshift').value);
  scheduleRender();
};

window.setParam = function() {
  juliaCr = parseInt(document.getElementById('cr').value)/100;
  juliaCi = parseInt(document.getElementById('ci').value)/100;
  document.getElementById('crVal').textContent = juliaCr.toFixed(2);
  document.getElementById('ciVal').textContent = juliaCi.toFixed(2);
  scheduleRender();
};

window.resetView = function() { resetView(); scheduleRender(); };

/* ── initial render ── */

scheduleRender();

})();
</script>
</body>
</html>
