<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roulette of Emotion</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050510}
canvas{display:block;width:100%;height:100%;object-fit:contain}
.ctrls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;opacity:.35;transition:opacity .3s}
.ctrls:hover{opacity:.9}
.ctrls button{background:rgba(255,255,255,.06);color:#778;border:1px solid rgba(255,255,255,.1);padding:5px 14px;cursor:pointer;font:12px/1.4 monospace;border-radius:3px}
.ctrls button:hover{background:rgba(255,255,255,.14);color:#aab}
</style>
</head>
<body>
<div class="ctrls">
  <button onclick="restart()">Restart</button>
  <button onclick="togglePause()">Pause</button>
</div>
<canvas id="art" width="1200" height="800"></canvas>
<script>
(function () {
'use strict';

var canvas = document.getElementById('art');
var ctx = canvas.getContext('2d');
var W = 1200, H = 800, CX = 600, CY = 410;
var PERSP = 0.55;

/* ── helpers ── */

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(t) { return t < 0 ? 0 : t > 1 ? 1 : t; }

var ease = {
  out3: function(t) { return 1 - Math.pow(1 - t, 3); },
  in2:  function(t) { return t * t; },
  in3:  function(t) { return t * t * t; },
  inOut: function(t) { return t < .5 ? 2*t*t : -1 + (4 - 2*t)*t; },
  out2: function(t) { return t * (2 - t); }
};

/* ── emotion data ── */

var emotions = [
  { name: 'Ecstasy',       col: '#FFE854' },
  { name: 'Joy',           col: '#FFFF54' },
  { name: 'Serenity',      col: '#FFFFB1' },
  { name: 'Admiration',    col: '#009600' },
  { name: 'Trust',         col: '#00B400' },
  { name: 'Acceptance',    col: '#54FF54' },
  { name: 'Terror',        col: '#2B8C5A' },
  { name: 'Fear',          col: '#59BDFF' },
  { name: 'Apprehension',  col: '#A5DBFF' },
  { name: 'Amazement',     col: '#0089E0' },
  { name: 'Surprise',      col: '#3B6BD4' },
  { name: 'Distraction',   col: '#7AA8E8' },
  { name: 'Grief',         col: '#0000C8' },
  { name: 'Sadness',       col: '#4848C8' },
  { name: 'Pensiveness',   col: '#8888D0' },
  { name: 'Loathing',      col: '#DE00DE' },
  { name: 'Disgust',       col: '#FF54FF' },
  { name: 'Boredom',       col: '#FFC6FF' },
  { name: 'Rage',          col: '#D40000' },
  { name: 'Anger',         col: '#FF0000' },
  { name: 'Annoyance',     col: '#FF8C8C' },
  { name: 'Vigilance',     col: '#FF7D00' },
  { name: 'Anticipation',  col: '#FFA854' },
  { name: 'Interest',      col: '#FFC48C' }
];

var NUM_SEGS = emotions.length;
var SEG_ARC = Math.PI * 2 / NUM_SEGS;

/* ── wheel geometry (wide segments) ── */

var OR = 330, IR = 185;
var TEXT_R = (OR + IR) / 2;

/* ── timing ── */

var REVEAL = 3, SLOW = 12, ACCEL = 5, PEAK = 3, DECEL = 7, SELECT = 7, RESET = 4;
var DUR = REVEAL+SLOW+ACCEL+PEAK+DECEL+SELECT+RESET;
var T_SLOW = REVEAL, T_ACCEL = T_SLOW+SLOW, T_PEAK = T_ACCEL+ACCEL;
var T_DECEL = T_PEAK+PEAK, T_SELECT = T_DECEL+DECEL, T_RESET = T_SELECT+SELECT;

/* ── rotation ── */

function wheelRotation(sec) {
  if (sec < REVEAL) return 0;
  var t = sec - REVEAL;
  if (t <= 0) return 0;
  if (t < SLOW) return .5*t;
  var rot = .5*SLOW; t -= SLOW;
  if (t < ACCEL) return rot + .5*t + 9.5*t*t/(2*ACCEL);
  rot += .5*ACCEL + 9.5*ACCEL/2; t -= ACCEL;
  if (t < PEAK) return rot + 10*t;
  rot += 10*PEAK; t -= PEAK;
  if (t < DECEL) return rot + 10*t - 5*t*t/DECEL;
  rot += 10*DECEL - 5*DECEL;
  return rot;
}
var TOTAL_ROT = wheelRotation(DUR);

function wheelVelocity(sec) {
  if (sec < REVEAL) return 0;
  var t = sec - REVEAL;
  if (t < SLOW) return .5;
  t -= SLOW;
  if (t < ACCEL) return .5 + 9.5*t/ACCEL;
  t -= ACCEL;
  if (t < PEAK) return 10;
  t -= PEAK;
  if (t < DECEL) return 10*(1-t/DECEL);
  return 0;
}

/* ── cycle state ── */

var selectedSegs = [], startAngle = 0;

function initCycle() {
  var primary = Math.floor(Math.random() * NUM_SEGS);
  selectedSegs = [primary, (primary+1)%NUM_SEGS, (primary+NUM_SEGS-1)%NUM_SEGS];
  startAngle = -(primary*SEG_ARC + SEG_ARC/2) - TOTAL_ROT;
}
initCycle();

/* ── stars ── */

var stars = [];
for (var i = 0; i < 60; i++) {
  stars.push({ x: Math.random()*W, y: Math.random()*H, r: .3+Math.random()*.9,
    ph: Math.random()*6.28, sp: .3+Math.random()*.5 });
}
function drawStars(time, alpha) {
  for (var i = 0; i < stars.length; i++) {
    var s = stars[i];
    ctx.fillStyle = 'rgba(190,195,230,' + ((.18+Math.sin(time*s.sp+s.ph)*.1)*alpha) + ')';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 6.28); ctx.fill();
  }
}

/* ── color utils ── */

function hexToRGB(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function darken(hex, amt) {
  var c = hexToRGB(hex), f = 1-amt;
  return 'rgb('+Math.round(c[0]*f)+','+Math.round(c[1]*f)+','+Math.round(c[2]*f)+')';
}
function lighten(hex, amt) {
  var c = hexToRGB(hex);
  return 'rgb('+Math.round(c[0]+(255-c[0])*amt)+','+Math.round(c[1]+(255-c[1])*amt)+','+Math.round(c[2]+(255-c[2])*amt)+')';
}
function colA(hex, a) {
  var c = hexToRGB(hex);
  return 'rgba('+c[0]+','+c[1]+','+c[2]+','+a+')';
}

/* ── rounded rect path ── */

function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

/* ── draw wheel segments ── */

function drawWheel(angle, textAlpha, borderAlpha, glowSegs, glowP) {
  for (var i = 0; i < NUM_SEGS; i++) {
    var emo = emotions[i];
    var sa = angle + i*SEG_ARC - Math.PI/2;
    var ea = sa + SEG_ARC;
    var isGlow = glowSegs && glowSegs.indexOf(i) >= 0;
    var extra = isGlow ? glowP*14 : 0;

    ctx.beginPath();
    ctx.arc(CX, CY, OR+extra, sa, ea);
    ctx.arc(CX, CY, IR, ea, sa, true);
    ctx.closePath();
    var g = ctx.createRadialGradient(CX, CY, IR, CX, CY, OR+extra);
    g.addColorStop(0, darken(emo.col, isGlow ? .02 : .2));
    g.addColorStop(.5, emo.col);
    g.addColorStop(1, lighten(emo.col, isGlow ? .25 : .1));
    ctx.fillStyle = g;
    ctx.fill();

    if (borderAlpha > .01) {
      ctx.strokeStyle = 'rgba(180,160,100,' + (borderAlpha*.5) + ')';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(CX+Math.cos(sa)*IR, CY+Math.sin(sa)*IR);
      ctx.lineTo(CX+Math.cos(sa)*(OR+extra), CY+Math.sin(sa)*(OR+extra));
      ctx.stroke();
    }

    if (textAlpha > .01) {
      var ta = sa + SEG_ARC/2;
      ctx.save();
      ctx.translate(CX, CY);
      ctx.rotate(ta);
      ctx.translate(TEXT_R, 0);
      ctx.scale(1, 1/PERSP);
      ctx.fillStyle = 'rgba(0,0,0,' + (textAlpha*.85) + ')';
      ctx.font = '14px Georgia, serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(emo.name, 0, 0);
      ctx.restore();
    }
  }

  if (borderAlpha > .01) {
    ctx.strokeStyle = 'rgba(180,160,100,' + (borderAlpha*.35) + ')';
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(CX, CY, OR, 0, 6.28); ctx.stroke();
    ctx.strokeStyle = 'rgba(180,160,100,' + (borderAlpha*.25) + ')';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(CX, CY, IR, 0, 6.28); ctx.stroke();
  }
}

/* ── hub ── */

function drawHub(alpha) {
  var hg = ctx.createRadialGradient(CX, CY, 15, CX, CY, IR-6);
  hg.addColorStop(0, 'rgba(28,24,18,' + (.92*alpha) + ')');
  hg.addColorStop(.6, 'rgba(20,17,14,' + (.88*alpha) + ')');
  hg.addColorStop(1, 'rgba(12,10,8,' + (.82*alpha) + ')');
  ctx.fillStyle = hg;
  ctx.beginPath(); ctx.arc(CX, CY, IR-6, 0, 6.28); ctx.fill();
  ctx.strokeStyle = 'rgba(160,140,90,' + (.1*alpha) + ')';
  ctx.lineWidth = 1;
  [IR-14, IR-35, 120, 75].forEach(function(r) {
    ctx.beginPath(); ctx.arc(CX, CY, r, 0, 6.28); ctx.stroke();
  });
  ctx.fillStyle = 'rgba(160,140,90,' + (.05*alpha) + ')';
  ctx.beginPath(); ctx.arc(CX, CY, 40, 0, 6.28); ctx.fill();
  ctx.strokeStyle = 'rgba(180,160,100,' + (.14*alpha) + ')';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(CX, CY, 40, 0, 6.28); ctx.stroke();
  ctx.beginPath(); ctx.arc(CX, CY, 14, 0, 6.28); ctx.stroke();
}

/* ── pointer (screen space) ── */

function drawPointer(glow, shiftX) {
  var px = CX + shiftX;
  var py = CY - OR*PERSP - 6;
  var ga = glow*.35 + .5;
  ctx.fillStyle = 'rgba(210,195,150,' + ga + ')';
  ctx.beginPath();
  ctx.moveTo(px, py+22);
  ctx.lineTo(px-12, py);
  ctx.lineTo(px+12, py);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(160,145,100,' + (ga*.6) + ')';
  ctx.lineWidth = 1;
  ctx.stroke();
  if (glow > .1) {
    var pg = ctx.createRadialGradient(px, py+11, 0, px, py+11, 30);
    pg.addColorStop(0, 'rgba(255,240,180,' + (glow*.18) + ')');
    pg.addColorStop(1, 'rgba(255,220,100,0)');
    ctx.fillStyle = pg;
    ctx.fillRect(px-30, py-20, 60, 60);
  }
}

/* ── right-side selection display (screen space) ── */

function drawSelection(segs, selectP, angle, shiftX, time) {
  if (selectP < .02) return;

  var panelX = 870;
  var baseY = CY - 85;
  var spacing = 85;

  for (var si = 0; si < segs.length; si++) {
    var idx = segs[si];
    var emo = emotions[idx];
    var growP = ease.out3(clamp((selectP - si*.12) / .45));
    if (growP < .01) continue;

    var y = baseY + si * spacing;
    var rgb = hexToRGB(emo.col);
    var cardW = 280, cardH = 60;
    var cx0 = panelX - 10;
    var pulse = 1 + Math.sin(time*2 + si*1.1)*.015;

    // connecting line from wheel segment to card
    if (growP > .2) {
      var segA = angle + idx*SEG_ARC + SEG_ARC/2 - Math.PI/2;
      var srcX = CX + shiftX + Math.cos(segA)*TEXT_R;
      var srcY = CY + Math.sin(segA)*TEXT_R*PERSP;
      var lineA = (growP-.2)/.8;
      ctx.strokeStyle = colA(emo.col, lineA*.08);
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(srcX, srcY);
      ctx.lineTo(cx0, y); ctx.stroke();
    }

    // card background
    ctx.fillStyle = 'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+(growP*.07)+')';
    rrect(cx0, y - cardH/2, cardW*growP, cardH, 5);
    ctx.fill();

    // left accent bar
    ctx.fillStyle = colA(emo.col, growP*.75);
    ctx.fillRect(cx0, y - cardH/2 + 6, 5, cardH - 12);

    // emotion name
    ctx.fillStyle = 'rgba(240,238,230,' + (growP*.92) + ')';
    ctx.font = Math.round(34*pulse) + 'px Georgia, serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(emo.name, cx0 + 18, y + 1);

    // subtle bottom line
    if (growP > .5) {
      var lineP = (growP-.5)/.5;
      ctx.strokeStyle = colA(emo.col, lineP*.15);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx0 + 18, y + cardH/2 - 6);
      ctx.lineTo(cx0 + 18 + lineP*180, y + cardH/2 - 6);
      ctx.stroke();
    }
  }
}

/* ── animation ── */

var t0 = null, paused = false, pauseT = 0, pauseStart = 0, raf = null;

function tick(ts) {
  if (!t0) t0 = ts;
  if (paused) { raf = requestAnimationFrame(tick); return; }

  var elapsed = (ts-t0)/1000 - pauseT;
  var sec = elapsed % DUR;
  var time = elapsed;

  var prevCycle = Math.floor((elapsed - 1/60) / DUR);
  var curCycle = Math.floor(elapsed / DUR);
  if (curCycle > prevCycle && elapsed > DUR) initCycle();

  ctx.globalAlpha = 1;
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W, H);

  var phase, p;
  if (sec < REVEAL)        { phase = 'reveal'; p = sec/REVEAL; }
  else if (sec < T_ACCEL)  { phase = 'slow';   p = (sec-T_SLOW)/SLOW; }
  else if (sec < T_PEAK)   { phase = 'accel';  p = (sec-T_ACCEL)/ACCEL; }
  else if (sec < T_DECEL)  { phase = 'peak';   p = (sec-T_PEAK)/PEAK; }
  else if (sec < T_SELECT) { phase = 'decel';  p = (sec-T_DECEL)/DECEL; }
  else if (sec < T_RESET)  { phase = 'select'; p = (sec-T_SELECT)/SELECT; }
  else                      { phase = 'reset';  p = (sec-T_RESET)/RESET; }

  var rot = wheelRotation(sec);
  var vel = wheelVelocity(sec);
  var angle = startAngle + rot;
  if (phase === 'decel') angle += Math.sin(p*38)*Math.exp(-p*5)*.08;

  var textAlpha = clamp(1 - (vel-.8)/2.5);
  var borderAlpha = clamp(1 - (vel-1.5)/4);
  var globalFade = 1;
  if (phase === 'reveal') globalFade = ease.out3(p);
  if (phase === 'reset') globalFade = 1 - ease.in3(clamp(p/.8));

  var selectP = phase === 'select' ? p : 0;
  var glowSegs = (phase === 'select' || phase === 'reset') ? selectedSegs : null;
  var glowP = phase === 'select' ? ease.out3(clamp(p/.3)) : (phase === 'reset' ? 1-p : 0);

  // wheel shifts left during selection to make room for the panel
  var shiftX = 0;
  if (phase === 'select') shiftX = ease.out3(clamp(p/.25)) * -120;
  else if (phase === 'reset') shiftX = (1-ease.in2(clamp(p/.35))) * -120;

  drawStars(time, .07*globalFade);

  // table surface
  var tg = ctx.createRadialGradient(CX+shiftX, CY+40, 60, CX+shiftX, CY+40, 520);
  tg.addColorStop(0, 'rgba(16,42,20,' + (.1*globalFade) + ')');
  tg.addColorStop(.5, 'rgba(10,28,14,' + (.05*globalFade) + ')');
  tg.addColorStop(1, 'rgba(6,16,8,0)');
  ctx.fillStyle = tg;
  ctx.fillRect(0, 0, W, H);

  // shadow under wheel
  ctx.fillStyle = 'rgba(0,0,0,' + (.06*globalFade) + ')';
  ctx.beginPath();
  ctx.ellipse(CX+shiftX, CY + OR*PERSP*.25, OR*.85, OR*PERSP*.12, 0, 0, 6.28);
  ctx.fill();

  // ── perspective block ──
  ctx.save();
  ctx.globalAlpha = globalFade;
  ctx.translate(shiftX, 0);
  ctx.translate(CX, CY);
  ctx.scale(1, PERSP);
  ctx.translate(-CX, -CY);

  var blurSteps = vel > 3 ? Math.min(5, Math.ceil(vel/2.5)) : 1;
  var blurSpread = vel*.01;

  if (blurSteps > 1) {
    for (var bi = 0; bi < blurSteps; bi++) {
      var bOff = (bi-(blurSteps-1)/2)*blurSpread;
      ctx.globalAlpha = globalFade/blurSteps;
      drawWheel(angle+bOff, textAlpha, borderAlpha, glowSegs, glowP);
    }
    ctx.globalAlpha = globalFade;
  } else {
    drawWheel(angle, textAlpha, borderAlpha, glowSegs, glowP);
  }
  drawHub(1);
  ctx.restore();

  // ── screen space: pointer, selection, title ──
  ctx.globalAlpha = globalFade;
  drawPointer(glowP, shiftX);

  if (selectP > 0) drawSelection(selectedSegs, selectP, angle, shiftX, time);

  if (phase === 'reset' && p < .5) {
    ctx.globalAlpha = (1-ease.in2(p/.5))*globalFade;
    drawSelection(selectedSegs, 1, angle, shiftX, time);
    ctx.globalAlpha = globalFade;
  }

  if ((phase === 'reveal' && p > .5) || (phase === 'slow' && p < .4)) {
    var ta2 = phase === 'reveal' ? ease.out3((p-.5)/.5) : (1-p/.4);
    ctx.fillStyle = 'rgba(180,170,155,' + (ta2*.35*globalFade) + ')';
    ctx.font = '22px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText('R O U L E T T E   O F   E M O T I O N', CX, CY + OR*PERSP + 50);
  }

  ctx.globalAlpha = 1;
  var vg = ctx.createRadialGradient(CX, CY, Math.min(W,H)*.3, CX, CY, Math.max(W,H)*.72);
  vg.addColorStop(0, 'rgba(0,0,5,0)');
  vg.addColorStop(1, 'rgba(0,0,5,.35)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  raf = requestAnimationFrame(tick);
}

/* ── controls ── */

window.restart = function () {
  t0 = null; pauseT = 0; paused = false;
  initCycle();
  if (raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(tick);
};

window.togglePause = function () {
  if (paused) { pauseT += (performance.now()-pauseStart)/1000; paused = false; }
  else { pauseStart = performance.now(); paused = true; }
};

raf = requestAnimationFrame(tick);

})();
</script>
</body>
</html>
