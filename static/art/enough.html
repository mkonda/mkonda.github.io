<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enough</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050510}
canvas{display:block;width:100%;height:100%;object-fit:contain}
.ctrls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;opacity:.35;transition:opacity .3s}
.ctrls:hover{opacity:.9}
.ctrls button{background:rgba(255,255,255,.06);color:#778;border:1px solid rgba(255,255,255,.1);padding:5px 14px;cursor:pointer;font:12px/1.4 monospace;border-radius:3px}
.ctrls button:hover{background:rgba(255,255,255,.14);color:#aab}
</style>
</head>
<body>
<div class="ctrls">
  <button onclick="restart()">Restart</button>
  <button onclick="togglePause()">Pause</button>
</div>
<canvas id="art" width="1200" height="800"></canvas>
<script>
(function () {
'use strict';

var canvas = document.getElementById('art');
var ctx = canvas.getContext('2d');
var W = 1200, H = 800, CX = 600, CY = 400;

/* ── helpers ── */

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(t) { return t < 0 ? 0 : t > 1 ? 1 : t; }

var ease = {
  out3: function(t) { return 1 - Math.pow(1 - t, 3); },
  in2:  function(t) { return t * t; },
  in3:  function(t) { return t * t * t; },
  inOut: function(t) { return t < .5 ? 2*t*t : -1 + (4 - 2*t)*t; },
  out2: function(t) { return t * (2 - t); }
};

/* ── word data ── */

var catColors = [
  { h: 215, s: 38, l: 70 },
  { h: 40,  s: 62, l: 60 },
  { h: 155, s: 42, l: 58 }
];

var catLabels = ['what others see', 'who you are', 'what you’ve done'];

var words = [
  { text: 'successful',    cat: 0, size: .95 },
  { text: 'productive',    cat: 0, size: .8 },
  { text: 'impressive',    cat: 0, size: .75 },
  { text: 'respected',     cat: 0, size: .9 },
  { text: 'attractive',    cat: 0, size: .6 },
  { text: 'accomplished',  cat: 0, size: .85 },
  { text: 'popular',       cat: 0, size: .55 },
  { text: 'smart',         cat: 0, size: .7 },
  { text: 'talented',      cat: 0, size: .75 },
  { text: 'competent',     cat: 0, size: .65 },
  { text: 'kind',          cat: 1, size: .9 },
  { text: 'honest',        cat: 1, size: .85 },
  { text: 'brave',         cat: 1, size: .8 },
  { text: 'patient',       cat: 1, size: .65 },
  { text: 'curious',       cat: 1, size: .75 },
  { text: 'creative',      cat: 1, size: .8 },
  { text: 'resilient',     cat: 1, size: .7 },
  { text: 'gentle',        cat: 1, size: .6 },
  { text: 'authentic',     cat: 1, size: .85 },
  { text: 'compassionate', cat: 1, size: .9 },
  { text: 'helped',        cat: 2, size: .85 },
  { text: 'built',         cat: 2, size: .7 },
  { text: 'taught',        cat: 2, size: .7 },
  { text: 'inspired',      cat: 2, size: .9 },
  { text: 'supported',     cat: 2, size: .8 },
  { text: 'created',       cat: 2, size: .8 },
  { text: 'connected',     cat: 2, size: .75 },
  { text: 'healed',        cat: 2, size: .6 },
  { text: 'listened',      cat: 2, size: .7 },
  { text: 'contributed',   cat: 2, size: .65 }
];

/* ── layout (Fibonacci spiral, interleaved by category) ── */

var golden = Math.PI * (3 - Math.sqrt(5));
var catOff = [{x:-40,y:-25},{x:5,y:5},{x:35,y:20}];
var layoutOrder = [];
for (var li = 0; li < 10; li++) { layoutOrder.push(li); layoutOrder.push(li+10); layoutOrder.push(li+20); }

for (var pi = 0; pi < layoutOrder.length; pi++) {
  var wi = layoutOrder[pi];
  var r = 42 + Math.sqrt(pi) * 46;
  var a = pi * golden;
  var co = catOff[words[wi].cat];
  words[wi].baseX = CX + Math.cos(a)*r + co.x + Math.sin(wi*7.3+.5)*26 + Math.cos(wi*11.1)*12;
  words[wi].baseY = CY + Math.sin(a)*r + co.y + Math.cos(wi*5.1+.3)*20 + Math.sin(wi*8.7)*8;
  words[wi].driftSpd = .1 + Math.sin(wi*3.7)*.06;
  words[wi].driftOff = wi * 1.37;
  words[wi].driftAmp = 3.5 + Math.sin(wi*4.3)*2;
}

/* ── perspectives ── */

var perspectives = [
  { label: 'through the eyes of family',
    words: ['kind','patient','gentle','honest','helped','listened','compassionate','connected','supported'] },
  { label: 'through the eyes of friends',
    words: ['brave','honest','creative','authentic','curious','supported','connected','inspired'] },
  { label: 'through the eyes of work',
    words: ['accomplished','successful','productive','built','created','contributed','competent','respected'] },
  { label: 'through the eyes of community',
    words: ['helped','inspired','taught','kind','connected','supported','contributed','compassionate'] }
];

/* ── timing ── */

var CAT_STARTS = [1, 8, 15];
var PERSP_START = 20, PERSP_DUR = 4, NUM_PERSP = 4;
var DISSOLVE_START = 36, DISSOLVE_DUR = 5;
var ENOUGH_START = 42, ENOUGH_DUR = 9;
var FADE_START = 51, FADE_DUR = 4;
var DUR = FADE_START + FADE_DUR;

function wordAppearTime(wi) {
  var cat = words[wi].cat;
  var catIdx = wi - cat * 10;
  return CAT_STARTS[cat] + catIdx * .45;
}

/* ── stars ── */

var stars = [];
for (var i = 0; i < 50; i++) {
  stars.push({ x: Math.random()*W, y: Math.random()*H, r: .3+Math.random()*.8,
    ph: Math.random()*6.28, sp: .3+Math.random()*.4 });
}
function drawStars(time, alpha) {
  for (var i = 0; i < stars.length; i++) {
    var s = stars[i];
    ctx.fillStyle = 'rgba(190,195,230,' + ((.15+Math.sin(time*s.sp+s.ph)*.08)*alpha) + ')';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 6.28); ctx.fill();
  }
}

/* ── compute word visibility ── */

function wordState(wi, sec) {
  var w = words[wi];
  var appear = wordAppearTime(wi);
  if (sec < appear) return { alpha: 0, scale: 0 };

  var fadeIn = ease.out3(clamp((sec - appear) / .7));
  var activeCat = sec < 8 ? 0 : sec < 15 ? 1 : sec < PERSP_START ? 2 : -1;

  var alpha, scale = fadeIn;

  if (activeCat >= 0) {
    alpha = w.cat === activeCat ? .88 : .35;
  } else {
    alpha = .45;
  }

  if (sec >= PERSP_START && sec < DISSOLVE_START) {
    var pi2 = Math.floor((sec - PERSP_START) / PERSP_DUR);
    if (pi2 < NUM_PERSP) {
      var pt = ((sec - PERSP_START) / PERSP_DUR) % 1;
      var pI = pt < .12 ? pt/.12 : pt > .88 ? (1-pt)/.12 : 1;
      pI = clamp(pI);
      var hl = perspectives[pi2].words.indexOf(w.text) >= 0;
      alpha = hl ? lerp(.4, .95, pI) : lerp(.4, .12, pI);
      scale *= hl ? lerp(1, 1.28, pI) : lerp(1, .82, pI);
    }
  }

  if (sec >= DISSOLVE_START) {
    var dP = ease.in2(clamp((sec - DISSOLVE_START) / DISSOLVE_DUR));
    alpha *= 1 - dP;
    scale *= 1 - dP * .3;
  }

  return { alpha: fadeIn * alpha, scale: scale };
}

/* ── draw a single word ── */

function drawWord(wi, sec, time) {
  var w = words[wi];
  var st = wordState(wi, sec);
  if (st.alpha < .01) return;

  var x = w.baseX + Math.sin(time*w.driftSpd + w.driftOff)*w.driftAmp;
  var y = w.baseY + Math.cos(time*w.driftSpd*.7 + w.driftOff+1)*w.driftAmp*.6;
  var fontSize = (15 + w.size * 18) * st.scale;
  if (fontSize < 3) return;

  var c = catColors[w.cat];
  ctx.fillStyle = 'hsla('+c.h+','+c.s+'%,'+c.l+'%,'+st.alpha+')';
  ctx.font = Math.round(fontSize) + 'px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(w.text, x, y);
}

/* ── draw category label ── */

function drawCatLabel(catIdx, sec) {
  var start = CAT_STARTS[catIdx];
  var fadeIn = ease.out3(clamp((sec - start + .5) / 1));
  var nextStart = catIdx < 2 ? CAT_STARTS[catIdx + 1] : PERSP_START;
  var fadeOut = 1 - ease.in2(clamp((sec - nextStart + 1) / 1.5));
  var alpha = Math.min(fadeIn, fadeOut);
  if (alpha < .01) return;

  var c = catColors[catIdx];
  ctx.fillStyle = 'hsla('+c.h+','+(c.s-10)+'%,'+(c.l+10)+'%,'+(alpha*.4)+')';
  ctx.font = 'italic 14px Georgia, serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(catLabels[catIdx], 55, 45 + catIdx * 22);
}

/* ── draw perspective label ── */

function drawPerspLabel(sec) {
  if (sec < PERSP_START || sec >= DISSOLVE_START) return;
  var pi2 = Math.floor((sec - PERSP_START) / PERSP_DUR);
  if (pi2 >= NUM_PERSP) return;
  var pt = ((sec - PERSP_START) / PERSP_DUR) % 1;
  var alpha = pt < .15 ? ease.out3(pt/.15) : pt > .85 ? ease.out3((1-pt)/.15) : 1;

  ctx.fillStyle = 'rgba(200,195,180,' + (alpha*.45) + ')';
  ctx.font = 'italic 18px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(perspectives[pi2].label, CX, 40);
}

/* ── draw "you are enough" ── */

function drawEnough(sec, time) {
  if (sec < ENOUGH_START) return;
  var p = clamp((sec - ENOUGH_START) / 3);
  var fadeIn = ease.out3(p);

  var g = ctx.createRadialGradient(CX, CY, 0, CX, CY, 140);
  g.addColorStop(0, 'rgba(255,200,100,' + (fadeIn*.07) + ')');
  g.addColorStop(.5, 'rgba(220,160,70,' + (fadeIn*.03) + ')');
  g.addColorStop(1, 'rgba(180,120,40,0)');
  ctx.fillStyle = g;
  ctx.fillRect(CX-140, CY-140, 280, 280);

  var pulse = 1 + Math.sin(time*1.2)*.008;
  ctx.fillStyle = 'rgba(225,218,200,' + (fadeIn*.88) + ')';
  ctx.font = Math.round(38*pulse) + 'px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('you are enough', CX, CY);

  if (fadeIn > .5) {
    var lineA = (fadeIn-.5)/.5;
    ctx.strokeStyle = 'rgba(200,180,140,' + (lineA*.12) + ')';
    ctx.lineWidth = 1;
    var lw = 160 * lineA;
    ctx.beginPath();
    ctx.moveTo(CX - lw, CY + 28);
    ctx.lineTo(CX + lw, CY + 28);
    ctx.stroke();
  }
}

/* ── animation ── */

var t0 = null, paused = false, pauseT = 0, pauseStart = 0, raf = null;

function tick(ts) {
  if (!t0) t0 = ts;
  if (paused) { raf = requestAnimationFrame(tick); return; }

  var elapsed = (ts - t0) / 1000 - pauseT;
  var sec = elapsed % DUR;
  var time = elapsed;

  ctx.globalAlpha = 1;
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W, H);

  var globalFade = 1;
  if (sec < 1) globalFade = ease.out3(sec);
  if (sec >= FADE_START) globalFade = 1 - ease.in3(clamp((sec - FADE_START) / (FADE_DUR * .8)));

  ctx.globalAlpha = globalFade;
  drawStars(time, .06);

  for (var wi = 0; wi < words.length; wi++) drawWord(wi, sec, time);

  for (var ci = 0; ci < 3; ci++) drawCatLabel(ci, sec);
  drawPerspLabel(sec);
  drawEnough(sec, time);

  ctx.globalAlpha = 1;
  var vg = ctx.createRadialGradient(CX, CY, Math.min(W, H)*.32, CX, CY, Math.max(W, H)*.72);
  vg.addColorStop(0, 'rgba(0,0,5,0)');
  vg.addColorStop(1, 'rgba(0,0,5,.3)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  raf = requestAnimationFrame(tick);
}

/* ── controls ── */

window.restart = function () {
  t0 = null; pauseT = 0; paused = false;
  if (raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(tick);
};

window.togglePause = function () {
  if (paused) { pauseT += (performance.now() - pauseStart) / 1000; paused = false; }
  else { pauseStart = performance.now(); paused = true; }
};

raf = requestAnimationFrame(tick);

})();
</script>
</body>
</html>
